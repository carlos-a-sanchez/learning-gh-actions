name: my-3rd-workflow
# To get trigger on every push in this repo in any branch
on: 
  workflow_dispatch:
  push:
    branches: 
      - main
      - dev
      - 'feature-*'
  pull_request:
    branches:
      - main

env:
  ENV_TYPE: DEV
  APP_USER: thinknyx
  APP_PORT: 80

jobs:
  job1:
    name: JOB1
    runs-on: ubuntu-latest
    steps:
      - name: Step-1
        run: | 
          pwd
          ls -ltr
          hostname
      - name: Checkout
        uses: actions/checkout@v7.0.0
      - name: Step-3
        run: | 
          echo `pwd` >> myartifact.txt
          mkdir artifacts
          echo `ls -ltr` >> artifacts/list.txt
          echo `hostname`  >> artifacts/hostname.txt
      - name: Upload single file
        uses: actions/upload-artifact@v5.0.0
        with:
          name: single_file
          path: ./myartifact.txt
      - name: Upload from directory
        uses: actions/upload-artifact@v5.0.0
        with:
          name: directory_artifacts
          path: artifacts/     
      - name: Upload from multiple paths
        uses: actions/upload-artifact@v5.0.0
        with:
          name: multiple_paths
          path: | 
            ./myartifact.txt
            artifacts/     
      - name: Upload from multiple paths with exclusions
        uses: actions/upload-artifact@v5.0.0
        with:
          name: multiple_paths_with_exclusions
          path: | 
            ./myartifact.txt

  job2:
    name: JOB2
    needs: job1
    runs-on: ubuntu-latest
    steps:
      - name: checking current directory
        run: |
          pwd      a            a
          ls -ltr
      - name: Download single file artifact
        uses: actions/download-artifact@v5.0.0
        with:
          name: single_file
      - name: Refering env variable
        run: |
          echo "[INFO] Running deployment for $ENV_TYPE with user $APP_USER."
          echo "[INFO] Application would be accesible on port $APP_PORT"

      - name: Refering REPO SECRET
        run: |
          echo "[INFO] Application pwd ${{ secrets.APP_PASSWORD }}"          
          
      - name: checking current directory
        run: | 
          pwd
          ls -ltr
      - name: Step fr PR Demos
        run: exit 0

  job3:
    name: JOB3
    needs: job1
    runs-on: ubuntu-latest
    steps:
      - name: Referring context or in-built variables
        run: |
          echo "[INFO] Triggered by ${{ github.event_name }}."
          echo "[INFO] New changes are added by ${{ github.actor }} in ${{ github.ref_name }} branch."
          echo "[INFO] Current step is running on ${{ runner.os }}."
          echo "[INFO] Current JOB ID is ${{ job.check_run_id }}."
          
  staging:
    name: STAGAE DEPLOYMENT
    runs-on: ubuntu-latest
    steps:
      - name: Refering Env Variables
        run: echo "[INFO] Running deplyment on ${{ vars.HOST }}" using ${{ vars.USER }}."
      - name: Refering Secrets
        run: echo "[INFO] Password for ${{ vars.USER }}" is  ${{ secrets.PASSWORD }}."
        



        
