name: my-first-workflow
# To get trigger on every push in this repo in any branch
on: push

jobs:
  job1:
    name: JOB1
    runs-on: ubuntu-latest
    steps:
      - name: Running Single Command in Job1
        run: echo "Hi, my 1st GitHub workflow"
      - name: Checking OS release for GitHub hosted runner
        run: cat /etc/os-release
      # - name: Calling sleep
      # run: sleep 20       
        
  job2:
    name: JOB2
    runs-on: ubuntu-latest
    steps:
      - name: Checking the hostname for runner
        run: hostname
      - name: Running multiple commands
        run: | 
          echo "Hi from Carlos Sanchez"
          echo "Current time is `date`"
          sleep 20
      
